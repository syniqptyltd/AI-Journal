name: mobile_crossplatform_app
description: A production-ready cross-platform Flutter app scaffold.
version: 0.1.0+1

environment:
  sdk: '>=2.17.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.0.2
  provider: ^6.0.0
  flutter_native_splash: ^2.2.18
  flutter_launcher_icons: ^0.10.0

dev_dependencies:
